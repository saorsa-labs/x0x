# x0x coverage ratchet configuration.
#
# This file is intentionally data-only. CI and local tooling read it through
# scripts/check-coverage-thresholds.py after cargo-llvm-cov emits lcov.info.

[global]
line_floor = 48.0
allowed_pr_drop = 0.5
exclusion_budget_percent = 2.0
lcov_artifact = "lcov.info"

[[modules]]
name = "WS-1 CLI commands"
owner = "WS-1"
phase = 1
target = 80.0
mode = "advisory"
paths = [
  "src/cli/**",
]

[[modules]]
name = "WS-2 REST/API and Agent core"
owner = "WS-2"
phase = 2
target = 90.0
mode = "advisory"
paths = [
  "src/lib.rs",
  "src/api/**",
]

[[modules]]
name = "WS-3 Exec subsystem"
owner = "WS-3"
phase = 2
target = 85.0
mode = "advisory"
paths = [
  "src/exec/**",
]

[[modules]]
name = "WS-3 Direct messaging"
owner = "WS-3"
phase = 2
target = 85.0
mode = "advisory"
paths = [
  "src/dm.rs",
  "src/dm_send.rs",
  "src/dm_inbox.rs",
]

[[modules]]
name = "WS-3 Self-update"
owner = "WS-3"
phase = 2
target = 85.0
mode = "advisory"
