[update]
enabled = true
stop_on_upgrade = true
gossip_updates = true
fallback_check_interval_minutes = 360
rollout_window_minutes = 60

# Gossip overlay tunables. See docs/adr/0009-recv-pump-overload-policy.md for
# the recv-pump overload + parallel-dispatch policy.
#
# `dispatch_workers` is the *initial floor* for the X0X-0009 adaptive worker
# supervisor. The supervisor watches recv_pump producer/consumer rates,
# queue depth, average dispatch time, dispatcher-watchdog timeouts, and
# per-peer-republish timeouts every 30 s, and scales workers up to a
# ceiling of 16 (then back down with hysteresis) without operator
# intervention. Setting this above 1 only makes sense as a soak override
# or to skip the warm-up period. Default 1 is correct for every node type.
[gossip]
dispatch_workers = 1
